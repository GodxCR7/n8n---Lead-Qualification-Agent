<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Qualification Form</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #22223a;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #f0f0f8;
    --muted: #6b6b8a;
    --success: #00e5a0;
    --error: #ff4d6d;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255,101,132,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 1;
  }

  .header {
    margin-bottom: 2.5rem;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(108,99,255,0.15);
    border: 1px solid rgba(108,99,255,0.3);
    color: #a89eff;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    margin-bottom: 1rem;
  }

  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 0.6rem;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    font-weight: 300;
    line-height: 1.6;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(108,99,255,0.5), transparent);
  }

  .field {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  input, textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
    background: rgba(108,99,255,0.06);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
  }

  input::placeholder, textarea::placeholder {
    color: rgba(107,107,138,0.6);
  }

  textarea {
    resize: vertical;
    min-height: 90px;
    line-height: 1.6;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .submit-btn {
    width: 100%;
    margin-top: 0.5rem;
    padding: 0.95rem;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    position: relative;
    overflow: hidden;
  }

  .submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(108,99,255,0.4);
  }

  .submit-btn:active {
    transform: translateY(0);
  }

  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .submit-btn .btn-text { transition: opacity 0.2s; }
  .submit-btn .btn-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
  .submit-btn.loading .btn-text { opacity: 0; }
  .submit-btn.loading .btn-loading { opacity: 1; }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result {
    margin-top: 1.25rem;
    padding: 1rem 1.2rem;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.6;
    display: none;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result.success {
    display: block;
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.25);
    color: var(--success);
  }

  .result.error {
    display: block;
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.25);
    color: var(--error);
  }

  .result.not-qualified {
    display: block;
    background: rgba(255,165,0,0.08);
    border: 1px solid rgba(255,165,0,0.25);
    color: #ffb347;
  }

  .result-icon { font-size: 1.4rem; margin-bottom: 0.3rem; }
  .result-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 0.2rem; }
  .result-msg { font-weight: 300; opacity: 0.85; }

  .n8n-url {
    margin-top: 1.5rem;
    padding: 0.7rem 1rem;
    background: rgba(255,255,255,0.03);
    border: 1px dashed var(--border);
    border-radius: 8px;
    font-size: 0.78rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .n8n-url span { color: #a89eff; font-family: monospace; word-break: break-all; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">AI-Powered</div>
    <h1>Lead <span>Qualification</span><br>Form</h1>
    <p class="subtitle">Submit your details and our AI will instantly qualify your lead and log it to Google Sheets.</p>
  </div>

  <div class="card">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="e.g. Rahul Sharma" required>
    </div>

    <div class="row">
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="rahul@company.com" required>
      </div>
      <div class="field">
        <label>Company</label>
        <input type="text" id="company" placeholder="TechCorp India" required>
      </div>
    </div>

    <div class="field">
      <label>Budget (₹ or $)</label>
      <input type="text" id="budget" placeholder="e.g. 5000" required>
    </div>

    <div class="field">
      <label>Message</label>
      <textarea id="message" placeholder="Describe what you need help with..."></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitLead()">
      <span class="btn-text">Submit Lead →</span>
      <span class="btn-loading"><div class="spinner"></div></span>
    </button>

    <div class="result" id="result">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="result-msg" id="resultMsg"></div>
    </div>

    <div class="n8n-url">
      🔗 Sending to: <span id="webhookDisplay">http://localhost:5678/webhook/lead-qualify</span>
    </div>
  </div>
</div>

<script>
  const WEBHOOK_URL = 'http://localhost:5678/webhook/lead-qualify';

  async function submitLead() {
    const name    = document.getElementById('name').value.trim();
    const email   = document.getElementById('email').value.trim();
    const company = document.getElementById('company').value.trim();
    const budget  = document.getElementById('budget').value.trim();
    const message = document.getElementById('message').value.trim();

    if (!name || !email || !company || !budget) {
      showResult('error', '⚠️', 'Missing Fields', 'Please fill in all required fields.');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading');
    btn.disabled = true;
    document.getElementById('result').style.display = 'none';

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, company, budget, message })
      });

      const text = await response.text();
      let data = {};
      try { data = JSON.parse(text); } catch(e) { data = { message: text }; }

      if (response.ok) {
        const status = (data.status || '').toLowerCase();
        if (status === 'qualified' || (data.message || '').toLowerCase().includes('qualified')) {
          showResult('success', '🎉', 'Qualified Lead!', data.message || 'You are a qualified lead. Our team will contact you shortly.');
        } else if (status === 'not_qualified') {
          showResult('not-qualified', '📋', 'Thank You', data.message || 'Thank you for reaching out. We will review your details.');
        } else {
          showResult('success', '✅', 'Submitted!', 'Your lead has been received and logged successfully.');
        }
      } else {
        showResult('error', '❌', 'Error', 'Something went wrong. Make sure your n8n workflow is active.');
      }
    } catch (err) {
      showResult('error', '❌', 'Connection Failed', 'Could not reach n8n. Make sure your workflow is activated (not just test mode).');
    }

    btn.classList.remove('loading');
    btn.disabled = false;
  }

  function showResult(type, icon, title, msg) {
    const el = document.getElementById('result');
    el.className = 'result ' + type;
    document.getElementById('resultIcon').textContent = icon;
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultMsg').textContent = msg;
  }
</script>
</body>
</html>
